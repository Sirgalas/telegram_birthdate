services:
  postgres:
    build:
      context: docker
      dockerfile: postgres/postgres.dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PG_DATA: /var/lib/postgresql/data-nocache
    volumes:
      - ./docker/postgres/db:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432
  pgadmin:
    image: dpage/pgadmin4:9.3.0
    restart: "no"
    ports:
      - ${PG_ADMIN_PORT}:80
    volumes:
      - ./docker/pgadmin/data:/var/lib/pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
      - ./docker/pgadmin/pgpass:/pgadmin4/pgpass
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:80/misc/ping || exit -1
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    entrypoint: /bin/sh -c "chmod 600 /pgadmin4/pgpass; /entrypoint.sh;"
  auth-db:
    build:
      context: docker
      dockerfile: postgres/auth.dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_AUTH_DB: ${POSTGRES_AUTH_DB}
      PG_DATA: /var/lib/postgresql/data-nocache
    volumes:
      - ./docker/postgres/authDb:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_AUTH_PORT}:5432
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    restart: "no"
    command:
      - "start-dev"
    ports:
      - ${KEYCLOAK_PORT}:9080
    environment:
      KC_HTTP_PORT: 9080
      KEYCLOAK_ADMIN: ${KEYCLOAK_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD}
      KC_DB_URL: jdbc:postgresql://auth-db:5432/${POSTGRES_AUTH_DB}
      KC_DB: postgres
      KC_DB_URL_HOST: auth-db
      KC_DB_URL_PORT: ${POSTGRES_AUTH_PORT}
      KC_DB_URL_DATABASE: ${POSTGRES_AUTH_DB}
      KC_DB_USERNAME: ${POSTGRES_AUTH_USER}
      KC_DB_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      test:
        [ "CMD-SHELL", "{ exec 3<>/dev/tcp/localhost/9000 && echo -e \"GET /health/ready HTTP/1.1\nhost: localhost:9000\n\" >&3 && timeout --preserve-status 1 cat <&3 | grep -m 1 -q 'status.*UP'; }" ]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    depends_on:
      - auth-db
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: "no"
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME:-2000}
    ports:
      - ${ZOOKEEPER_PORT_HOST:-2181}:2181
    networks:
      - notification_telegram
    volumes:
      - ./docker/zookeeper/data:/var/lib/zookeeper/data
      - ./docker/zookeeper/log:/var/lib/zookeeper/log
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: "no"
    depends_on:
      - zookeeper
    ports:
      - ${KAFKA_EXTERNAL_PORT:-9092}:9092
      - ${KAFKA_INTERNAL_PORT:-29092}:29092
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: "${KAFKA_ZOOKEEPER_CONNECT}:${ZOOKEEPER_CLIENT_PORT:-2181}"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://0.0.0.0:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_INTERNAL_PORT:-29092},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-false}
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-1}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_DEFAULT_REPLICATION_FACTOR:-1}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-1073741824}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - notification_telegram
    volumes:
      - ./docker/kafka/data:/var/lib/kafka/data
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: "no"
    depends_on:
      - kafka
    ports:
      - ${KAFKA_UI_PORT:-8080}:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:${KAFKA_INTERNAL_PORT}"
      KAFKA_CLUSTERS_0_JMXPORT: ${KAFKA_UI_JMX_PORT}
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      AUTH_TYPE: ${KAFKA_UI_AUTH_TYPE:-DISABLED}
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_AUTH_USERNAME}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_AUTH_PASSWORD}
      LOG_LEVEL: ${KAFKA_UI_LOG_LEVEL}
    networks:
      - notification_telegram
  mongodb:
    image: mongo:7.0
    ports:
      - ${MONGO_PORT}:27017
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      - ./docker/mongo:/data/db
    networks:
      - notification_telegram
    restart: unless-stopped
  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: birtdate-mongo-express
    ports:
      - ${MONGO_EXPERSS_PORT}:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:${MONGO_PORT}/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS}
    depends_on:
      - mongodb
    networks:
      - notification_telegram
    restart: unless-stopped


networks:
  notification_telegram:
    driver: bridge